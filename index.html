<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angry Ducks vs. Hens</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            /* A nice sky blue gradient for the background */
            background: linear-gradient(to bottom, #87CEEB 0%, #e0f6ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Prevents mobile swipe-to-scroll and pull-to-refresh */
            touch-action: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            /* Locks touch inputs strictly to the game canvas */
            touch-action: none; 
        }

        /* UI Layer to hold text and menus above the canvas */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Lets clicks pass through to the game */
        }

        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 36px;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        #levelBoard {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 36px;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        /* The Game Over / Level Complete Popup */
        #modal {
            display: none; /* Hidden until triggered by JS */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            pointer-events: auto; /* Allows clicking the button inside */
            border: 5px solid #FFC107;
        }

        #modal h1 {
            margin-top: 0;
            color: #333;
            font-size: 36px;
            margin-bottom: 25px;
        }

        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #FF5722;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #D84315;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <div id="ui-layer">
        <div id="scoreBoard">Score: 0</div>
        <div id="levelBoard">Level: 1</div>
        
        <div id="modal">
            <h1 id="modalMessage">Level Complete!</h1>
            <button id="modalBtn" onclick="nextAction()">Next Level</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
