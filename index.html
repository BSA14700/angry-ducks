<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angry Ducks vs. Hens</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background: linear-gradient(to bottom, #4CB8C4 0%, #3CD3AD 100%);
            /* NEW: Centers the game on your screen */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            /* NEW: Forces the game to fit perfectly without breaking the layout! */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            box-shadow: 0 0 20px rgba(0,0,0,0.3); /* Adds a nice shadow behind the game */
        }
        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            z-index: 10;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: 0</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
