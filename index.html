<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angry Ducks: SVG Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #222; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 0 #000;
        }
        #scoreBoard { font-size: 32px; }
        #levelIndicator { font-size: 20px; color: #FFD700; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreBoard">Score: 0</div>
        <div id="levelIndicator">Level 1: The Farm Gate</div>
    </div>
    
    <div class="controls">Drag and release to launch ducks. Clear all hens to advance!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
